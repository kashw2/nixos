name: Build Package
on:
  workflow_dispatch:
  pull_request:
    paths:
      - flake.nix
      - flake.lock
      - modules/features/nushell.nix
      - modules/features/kitty.nix
      - modules/features/fastfetch.nix
      - modules/features/act.nix
      - modules/features/desktop-environment/sddm-sugar-candy.nix
      - modules/features/desktop-environment/hyprland.nix
      - modules/features/desktop-environment/hypridle.nix
      - modules/features/desktop-environment/hyprlock.nix
      - modules/features/desktop-environment/hyprpaper.nix
      - modules/features/desktop-environment/quickshell.nix
      - modules/features/desktop-environment/quickshell/**
      - modules/features/deploy.nix
      - modules/features/nixvim/atone-nvim.nix
      - modules/features/nixvim/codestats.nix
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.classify.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            flake:
              - 'flake.nix'
              - 'flake.lock'
            nushell: 'modules/features/nushell.nix'
            kitty: 'modules/features/kitty.nix'
            fastfetch: 'modules/features/fastfetch.nix'
            act: 'modules/features/act.nix'
            sddm-sugar-candy: 'modules/features/desktop-environment/sddm-sugar-candy.nix'
            hyprland: 'modules/features/desktop-environment/hyprland.nix'
            hypridle: 'modules/features/desktop-environment/hypridle.nix'
            hyprlock: 'modules/features/desktop-environment/hyprlock.nix'
            hyprpaper: 'modules/features/desktop-environment/hyprpaper.nix'
            atone-nvim: 'modules/features/nixvim/atone-nvim.nix'
            codestats: 'modules/features/nixvim/codestats.nix'
            quickshell:
              - 'modules/features/desktop-environment/quickshell.nix'
              - 'modules/features/desktop-environment/quickshell/**'
            deploy-host: 'modules/features/deploy.nix'
      - id: classify
        env:
          EVENT: ${{ github.event_name }}
          FLAKE_CHANGED: ${{ steps.changes.outputs.flake }}
          CHANGES: ${{ steps.changes.outputs.changes }}
        run: |
          ALL='["nushell","act","kitty","sddm-sugar-candy","hyprland","hypridle","hyprlock","hyprpaper","atone-nvim","codestats","quickshell","fastfetch","deploy-host"]'
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$FLAKE_CHANGED" = "true" ]; then
            echo "packages=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$(jq -c 'map(select(. != "flake"))' <<< "$CHANGES")" >> "$GITHUB_OUTPUT"
          fi
  build:
    name: Build ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJSON(needs.detect-changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31.10.5
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-package
          restore-prefixes-all-match: |
            nix-devshell
            nix-package
          save: true
      - run: nix develop --command nix build .#${{ matrix.package }} --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
