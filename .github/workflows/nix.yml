name: Nix
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '*.nix'
      - flake.lock
      - modules/**
      - secrets/**
  pull_request:
    paths:
      - '*.nix'
      - flake.lock
      - modules/**
      - secrets/**
  schedule:
    - cron: 0 0 * * 0 # runs every week
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update:
    name: Update ${{ matrix.input }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        input:
          - nixpkgs
          - flake-parts
          - import-tree
          - disko
          - colmena
          - wrapper-modules
          - hyprland
          - hyprpaper
          - hyprlock
          - rose-pine-hyprcursor
          - xdg-desktop-portal-hyprland
          - nixvim
          - neovim-nightly
          - home-manager
          - mcp-servers-nix
          - sops-nix
          - nixcord
          - quickshell
          - nix
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/update-flake-lock@v28
        with:
          inputs: ${{ matrix.input }}
          commit-msg: 'build(nix): update ${{ matrix.input }}'
          pr-title: Update ${{ matrix.input }}
          branch: update-${{ matrix.input }}-flake-input
          pr-labels: |
            dependencies
            nix
          token: ${{ secrets.GH_TOKEN }} # We have to use our own token because otherwise PRs won't run actions
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-devshell-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-devshell-
            nix-packages-common-${{ hashFiles('flake.lock') }}
            nix-packages-common-
            nix-
          gc-max-store-size-linux: 3G
      - run: nix develop --command nix flake check --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
  detect-hosts:
    name: Detect Hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      hosts: ${{ steps.detect.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ !env.ACT }}
        with:
          fetch-depth: 0
      - id: detect
        if: ${{ !env.ACT }}
        run: |
          ALL='["home","laptop","thinkpad","media"]'
          DESKTOP='["home","laptop","thinkpad"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "hosts=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check branch name for known desktop-only flake input updates
          BRANCH="${{ github.head_ref }}"
          DESKTOP_INPUTS="hyprland hyprpaper hyprlock rose-pine-hyprcursor xdg-desktop-portal-hyprland quickshell"

          for input in $DESKTOP_INPUTS; do
            if [ "$BRANCH" = "update-${input}-flake-input" ]; then
              echo "hosts=$DESKTOP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # Check changed files - if all are desktop-only, skip server builds
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          NEEDS_SERVER=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              modules/features/desktop-environment/*) ;;
              modules/features/audio.nix) ;;
              modules/features/virtualisation.nix) ;;
              modules/features/rofi.nix) ;;
              modules/features/kitty.nix) ;;
              modules/desktop.nix) ;;
              modules/laptop.nix) ;;
              *)
                NEEDS_SERVER=true
                break
                ;;
            esac
          done <<< "$CHANGED"

          if [ "$NEEDS_SERVER" = "true" ]; then
            echo "hosts=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "hosts=$DESKTOP" >> "$GITHUB_OUTPUT"
          fi
  build-configuration:
    name: Build Configuration
    needs: detect-hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.detect-hosts.outputs.hosts || '["home","laptop","thinkpad","media"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@v10
        if: ${{ !env.ACT }}
        with:
          witness-carnage: true
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-host-${{ matrix.host }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-host-${{ matrix.host }}-
            nix-hosts-common-${{ hashFiles('flake.lock') }}
            nix-hosts-common-
            nix-
          gc-max-store-size-linux: 6G
      - run: nix develop --command colmena build --on ${{ matrix.host }} --verbose --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
  merge-hosts:
    name: Merge Host Caches
    needs: build-configuration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@v10
        if: ${{ !env.ACT }}
        with:
          witness-carnage: true
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-hosts-common-${{ hashFiles('flake.lock') }}
          restore-prefixes-all-matches: |
            nix-host-home-${{ hashFiles('flake.lock') }}
            nix-host-laptop-${{ hashFiles('flake.lock') }}
            nix-host-thinkpad-${{ hashFiles('flake.lock') }}
            nix-host-media-${{ hashFiles('flake.lock') }}
          purge: true
          purge-prefixes: |
            nix-hosts-common-
            nix-host-
          purge-created: 0
          purge-primary-key: never
