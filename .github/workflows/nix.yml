name: Nix
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '*.nix'
      - flake.lock
      - modules/**
      - secrets/**
  schedule:
    - cron: 0 0 * * 0 # runs every week
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-devshell
          restore-prefixes-first-match: nix-devshell
          gc-max-store-size-linux: 3G
      - run: nix develop --command nix flake check --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
  detect-hosts:
    name: Detect Hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      hosts: ${{ steps.detect.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ !env.ACT }}
        with:
          fetch-depth: 0
      - id: detect
        if: ${{ !env.ACT }}
        run: |
          ALL='["home","laptop","thinkpad","media"]'
          DESKTOP='["home","laptop","thinkpad"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "hosts=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check branch name for known desktop-only flake input updates
          BRANCH="${{ github.head_ref }}"
          DESKTOP_INPUTS="hyprland hyprpaper hyprlock rose-pine-hyprcursor xdg-desktop-portal-hyprland quickshell"

          for input in $DESKTOP_INPUTS; do
            if [ "$BRANCH" = "update-${input}-flake-input" ]; then
              echo "hosts=$DESKTOP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # Check changed files - if all are desktop-only, skip server builds
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          NEEDS_SERVER=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              modules/features/desktop-environment/*) ;;
              modules/features/audio.nix) ;;
              modules/features/virtualisation.nix) ;;
              modules/features/kitty.nix) ;;
              modules/desktop.nix) ;;
              modules/laptop.nix) ;;
              *)
                NEEDS_SERVER=true
                break
                ;;
            esac
          done <<< "$CHANGED"

          if [ "$NEEDS_SERVER" = "true" ]; then
            echo "hosts=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "hosts=$DESKTOP" >> "$GITHUB_OUTPUT"
          fi
  build-configuration:
    name: Build Configuration
    needs: detect-hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.detect-hosts.outputs.hosts || '["home","laptop","thinkpad","media"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nixos-configuration
          restore-prefixes-all-match: |
            nix-devshell
            nixos-configuration
          gc-max-store-size-linux: 6G
      - run: nix develop --command colmena build --on ${{ matrix.host }} --verbose --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
