name: Nix
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '*.nix'
      - flake.lock
      - modules/**
      - secrets/**
  schedule:
    - cron: 0 0 * * 0 # runs every week
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-devshell
          restore-prefixes-first-match: nix-devshell
          gc-max-store-size-linux: 3G
      - run: nix develop --command nix flake check --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
  detect-hosts:
    name: Detect Hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      hosts: ${{ steps.detect.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/detect-hosts
        id: detect
  build-configuration:
    name: Build Configuration
    needs: detect-hosts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.detect-hosts.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v6
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nixos-configuration
          restore-prefixes-all-match: |
            nix-devshell
            nixos-configuration
          gc-max-store-size-linux: 6G
      - run: nix develop --command colmena build --on ${{ matrix.host }} --verbose --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
