name: ISO
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/iso.yml
      - modules/installer.nix
      - modules/features/impermanence.nix
      - modules/features/sops.nix
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect-hosts:
    name: Detect Hosts
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.detect.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/detect-hosts
        id: detect
  build:
    name: Build
    needs: detect-hosts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.detect-hosts.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
      - uses: tailscale/github-action@v4
        continue-on-error: true
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - uses: ryanccn/attic-action@v0
        continue-on-error: true
        with:
          endpoint: http://100.79.68.16:8080
          cache: nixos
          token: ${{ secrets.ATTIC_TOKEN }}
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-iso
          restore-prefixes-all-matches: |
            nix-devshell
            nixos-configuration
            nix-iso
          gc-max-store-size-linux: 8G
      - run: nix develop --command nix build .#installer-${{ matrix.host }} --impure
        env:
          NIXPKGS_ALLOW_UNFREE: 1
